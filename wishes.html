<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishes &ndash; Mang &amp; Cing</title>
<link rel="stylesheet" href="css/shared.css">
<style>
.page-header { text-align:center; padding:50px 20px 20px; }
.wishes-wrap { max-width:900px; margin:0 auto; padding:0 20px 80px; }
.stats-bar {
  background:var(--card); border:1px solid var(--border); border-radius:18px;
  padding:20px 28px; margin-bottom:24px; display:flex; gap:28px; align-items:center; flex-wrap:wrap;
  backdrop-filter:blur(15px); position:relative; z-index:1;
}
.stat-item { text-align:center; }
.stat-num { font-family:'Playfair Display',serif; font-size:1.9rem; color:var(--deep-rose); font-weight:700; display:block; }
.stat-lbl { font-size:0.7rem; color:var(--text-light); text-transform:uppercase; letter-spacing:1px; }
.progress-bar { flex:1; min-width:200px; }
.progress-track { height:8px; border-radius:4px; background:rgba(232,160,176,0.18); overflow:hidden; }
.progress-fill { height:100%; border-radius:4px; background:var(--btn-grad); transition:width 1s ease; }
.add-wish-form {
  background:var(--card); border:1px solid var(--border); border-radius:22px;
  padding:30px; margin-bottom:30px; backdrop-filter:blur(15px);
  box-shadow:0 8px 32px var(--shadow); position:relative; z-index:1;
}
.add-wish-form h2 { font-family:'Playfair Display',serif; color:var(--deep-rose); margin-bottom:16px; font-size:1.3rem; }
.category-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.cat-tab {
  padding:7px 16px; border-radius:50px; border:1.5px solid var(--border);
  background:transparent; color:var(--text-light); cursor:pointer; font-size:0.82rem;
  transition:all 0.3s; letter-spacing:0.3px;
}
.cat-tab.active { background:var(--deep-rose); color:white; border-color:transparent; }
.wishes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(255px,1fr)); gap:14px; position:relative; z-index:1; }
.wish-card {
  background:var(--card); border:1px solid var(--border); border-radius:18px;
  padding:22px; backdrop-filter:blur(15px); box-shadow:0 4px 20px var(--shadow);
  transition:all 0.3s; position:relative; overflow:hidden; animation:fadeUp 0.5s ease;
}
.wish-card:hover { transform:translateY(-3px); box-shadow:0 12px 40px var(--shadow); }
.wish-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--btn-grad); }
.wish-card.completed::before { background:linear-gradient(135deg,#4caf50,#8bc34a); }
.wish-cat { font-size:0.68rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--gold); font-weight:700; margin-bottom:8px; }
.wish-text { font-family:'Playfair Display',serif; color:var(--text); font-size:0.97rem; line-height:1.65; margin-bottom:14px; }
.wish-card.completed .wish-text { text-decoration:line-through; opacity:0.55; }
.wish-meta { display:flex; justify-content:space-between; align-items:center; }
.wish-from { font-size:0.75rem; color:var(--text-light); }
.wish-actions { display:flex; gap:8px; align-items:center; }
.check-btn {
  background:none; border:1.5px solid var(--border); border-radius:50%;
  width:28px; height:28px; cursor:pointer; font-size:0.82rem;
  transition:all 0.25s; display:flex; align-items:center; justify-content:center; color:var(--text-light);
}
.check-btn:hover { border-color:#4caf50; color:#4caf50; }
.wish-card.completed .check-btn { background:#4caf50; border-color:#4caf50; color:white; }
.del-btn-w { background:none; border:none; cursor:pointer; color:#cc5566; font-size:0.75rem; opacity:0.35; transition:opacity 0.2s; }
.del-btn-w:hover { opacity:1; }
.form-actions { display:flex; justify-content:flex-end; margin-top:12px; }
</style>
</head>
<body>
<div class="petals-bg" id="petalsBg"></div>
<div id="navPlaceholder"></div>
<main>
<div class="page-header fade-up">
  <h1 class="section-title">Wishes &amp; Promises</h1>
  <p class="section-sub">Dreams to chase, promises to keep, adventures ahead&hellip;</p>
</div>
<div class="wishes-wrap">
  <div class="stats-bar fade-up">
    <div class="stat-item">
      <span class="stat-num" id="totalWishes">0</span>
      <span class="stat-lbl">Total Wishes</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="doneWishes">0</span>
      <span class="stat-lbl">Completed</span>
    </div>
    <div class="progress-bar">
      <div style="font-size:0.78rem;color:var(--text-light);margin-bottom:7px;" id="progressLabel">0% complete</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="add-wish-form fade-up">
    <h2>Add a Wish or Promise</h2>
    <div class="category-tabs" id="addCatTabs">
      <button class="cat-tab active" data-cat="Travel"    onclick="selectCat(this)">Travel</button>
      <button class="cat-tab" data-cat="Adventure" onclick="selectCat(this)">Adventure</button>
      <button class="cat-tab" data-cat="Romance"   onclick="selectCat(this)">Romance</button>
      <button class="cat-tab" data-cat="Promise"   onclick="selectCat(this)">Promise</button>
      <button class="cat-tab" data-cat="Fun"       onclick="selectCat(this)">Fun</button>
      <button class="cat-tab" data-cat="Life"      onclick="selectCat(this)">Life</button>
    </div>
    <textarea id="wishText" placeholder="Write your wish or promise here&hellip;" style="min-height:80px;resize:vertical;margin-bottom:0;"></textarea>
    <div class="form-actions"><button class="btn-primary" onclick="addWish()">Add Wish</button></div>
  </div>

  <div class="category-tabs fade-up" id="filterTabs" style="margin-bottom:20px;">
    <button class="cat-tab active" onclick="filterWishes('all',this)">All</button>
    <button class="cat-tab" onclick="filterWishes('Travel',this)">Travel</button>
    <button class="cat-tab" onclick="filterWishes('Adventure',this)">Adventure</button>
    <button class="cat-tab" onclick="filterWishes('Romance',this)">Romance</button>
    <button class="cat-tab" onclick="filterWishes('Promise',this)">Promise</button>
    <button class="cat-tab" onclick="filterWishes('Fun',this)">Fun</button>
    <button class="cat-tab" onclick="filterWishes('Life',this)">Life</button>
  </div>

  <div class="wishes-grid" id="wishesGrid"></div>
</div>
</main>
<script src="js/shared.js"></script>
<script>
checkAuth(); applyTheme();
document.getElementById('navPlaceholder').innerHTML = navHtml('wishes');
spawnPetals(document.getElementById('petalsBg'), 15);
let wishes=JSON.parse(localStorage.getItem('our_wishes')||'[]');
let selectedCat='Travel', currentFilter='all';
const role=getRole();
if(!wishes.length){
  wishes=[
    {id:1,text:'Visit Paris together',cat:'Travel',from:'Both',done:false},
    {id:2,text:'Cook an entire meal together without burning anything',cat:'Fun',from:'Both',done:false},
    {id:3,text:'Watch every sunset we can, together',cat:'Romance',from:'Mang',done:false},
    {id:4,text:'Always talk things through, no matter what',cat:'Promise',from:'Both',done:false},
    {id:5,text:'Take a completely spontaneous trip with no plan',cat:'Adventure',from:'Cing',done:false},
    {id:6,text:'Dance together in the rain at least once',cat:'Romance',from:'Both',done:false},
  ];
  save();
}
function save(){ localStorage.setItem('our_wishes',JSON.stringify(wishes)); }
function selectCat(btn){
  selectedCat=btn.dataset.cat;
  document.querySelectorAll('#addCatTabs .cat-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function filterWishes(cat,btn){
  currentFilter=cat;
  document.querySelectorAll('#filterTabs .cat-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); render();
}
function addWish(){
  const text=document.getElementById('wishText').value.trim();
  if(!text){ showNotif('Write your wish first.'); return; }
  const from=role==='mang'?'Mang':role==='cing'?'Cing':'Both';
  wishes.unshift({id:Date.now(),text,cat:selectedCat,from,done:false});
  save(); render();
  document.getElementById('wishText').value='';
  showNotif('Wish added.');
}
function toggleDone(id){ const w=wishes.find(x=>x.id===id); if(w){ w.done=!w.done; save(); render(); if(w.done) showNotif('Wish completed!'); } }
function deleteWish(id){ if(confirm('Remove this wish?')){ wishes=wishes.filter(w=>w.id!==id); save(); render(); } }
function render(){
  const grid=document.getElementById('wishesGrid');
  const filtered=currentFilter==='all'?wishes:wishes.filter(w=>w.cat===currentFilter);
  grid.innerHTML=filtered.map(w=>`
    <div class="wish-card ${w.done?'completed':''}">
      <div class="wish-cat">${w.cat}</div>
      <div class="wish-text">${w.text}</div>
      <div class="wish-meta">
        <span class="wish-from">${w.from}</span>
        <div class="wish-actions">
          <button class="check-btn" onclick="toggleDone(${w.id})" title="${w.done?'Mark undone':'Mark done'}">${w.done?'&#x2713;':'&#x25CB;'}</button>
          <button class="del-btn-w" onclick="deleteWish(${w.id})">&#x2715;</button>
        </div>
      </div>
    </div>
  `).join('')||'<div style="text-align:center;padding:40px;color:var(--text-light);font-style:italic;font-family:\'Playfair Display\',serif;">No wishes in this category yet.</div>';
  const done=wishes.filter(w=>w.done).length, total=wishes.length, pct=total?Math.round(done/total*100):0;
  document.getElementById('totalWishes').textContent=total;
  document.getElementById('doneWishes').textContent=done;
  document.getElementById('progressLabel').textContent=pct+'% complete';
  setTimeout(()=>document.getElementById('progressFill').style.width=pct+'%',100);
}
render();
</script>
</body>
</html>
