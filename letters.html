<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letters &ndash; Mang &amp; Cing</title>
<link rel="stylesheet" href="css/shared.css">
<style>
.page-header { text-align:center; padding:50px 20px 20px; }
.letters-wrap { max-width:880px; margin:0 auto; padding:0 20px 60px; }
.write-card {
  background:var(--card); border:1px solid var(--border); border-radius:24px;
  padding:32px; backdrop-filter:blur(15px); box-shadow:0 8px 32px var(--shadow);
  margin-bottom:36px; position:relative; z-index:1;
}
.write-card h2 { font-family:'Playfair Display',serif; color:var(--deep-rose); margin-bottom:6px; font-size:1.4rem; }
.from-badge {
  display:inline-block; padding:5px 16px; border-radius:50px;
  font-size:0.8rem; font-weight:700; margin-bottom:18px;
  text-transform:uppercase; letter-spacing:1px;
}
.from-mang { background:rgba(100,150,255,0.12); color:#4477cc; border:1px solid rgba(100,150,255,0.25); }
.from-cing { background:rgba(255,100,150,0.12); color:#b03060; border:1px solid rgba(255,100,150,0.25); }
.from-site { background:rgba(180,180,180,0.12); color:#888; border:1px solid rgba(180,180,180,0.2); }
textarea.letter-body {
  min-height:160px; resize:vertical; font-size:1rem; line-height:1.8;
  font-family:'Playfair Display',serif; margin-bottom:16px;
}
.filter-bar { display:flex; gap:10px; margin-bottom:22px; flex-wrap:wrap; position:relative; z-index:1; }
.filter-btn {
  padding:8px 18px; border-radius:50px; border:1.5px solid var(--border);
  background:transparent; color:var(--text-light); cursor:pointer; font-size:0.83rem;
  transition:all 0.3s; letter-spacing:0.3px;
}
.filter-btn.active, .filter-btn:hover { background:var(--deep-rose); color:white; border-color:transparent; }
.letter-card {
  background:var(--card); border:1px solid var(--border); border-radius:20px;
  padding:28px; margin-bottom:18px;
  backdrop-filter:blur(15px); box-shadow:0 4px 20px var(--shadow);
  position:relative; z-index:1; transition:all 0.3s;
  animation:fadeUp 0.5s ease;
}
.letter-card:hover { transform:translateY(-3px); box-shadow:0 12px 40px var(--shadow); }
.letter-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
.letter-from-name { font-family:'Dancing Script',cursive; font-size:1.4rem; color:var(--deep-rose); }
.letter-date { font-size:0.78rem; color:var(--text-light); }
.letter-subject { font-family:'Playfair Display',serif; font-size:1.05rem; color:var(--text); margin-bottom:10px; font-style:italic; }
.letter-body-text { color:var(--text-light); line-height:1.9; font-family:'Playfair Display',serif; font-style:italic; font-size:0.95rem; }
.letter-footer { margin-top:16px; display:flex; justify-content:flex-end; gap:10px; align-items:center; }
.react-btn {
  background:none; border:1px solid var(--border); border-radius:50px;
  padding:5px 12px; cursor:pointer; font-size:0.8rem; color:var(--text-light);
  transition:all 0.2s;
}
.react-btn:hover { border-color:var(--deep-rose); color:var(--deep-rose); }
.del-letter { background:none; border:none; cursor:pointer; color:#cc5566; font-size:0.78rem; opacity:0.4; transition:opacity 0.2s; }
.del-letter:hover { opacity:1; }
.no-letters { text-align:center; padding:60px; color:var(--text-light); font-family:'Playfair Display',serif; font-style:italic; }
.form-actions { display:flex; justify-content:flex-end; gap:12px; }
</style>
</head>
<body>
<div class="petals-bg" id="petalsBg"></div>
<div id="navPlaceholder"></div>
<main>
<div class="page-header fade-up">
  <h1 class="section-title">Love Letters</h1>
  <p class="section-sub">Words straight from the heart&hellip;</p>
</div>
<div class="letters-wrap">
  <div class="write-card fade-up">
    <h2>Write a Letter</h2>
    <span class="from-badge" id="fromBadge">Loading&hellip;</span>
    <input type="text" id="subjectInput" placeholder="Subject&hellip;" style="margin-bottom:12px;">
    <textarea class="letter-body" id="letterBody" placeholder="Dear Mang / Dear Cing&#10;&#10;Write your heart out&hellip;"></textarea>
    <div class="form-actions">
      <button class="btn-secondary" onclick="clearForm()">Clear</button>
      <button class="btn-primary" onclick="sendLetter()">Send Letter</button>
    </div>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterLetters('all',this)">All</button>
    <button class="filter-btn" onclick="filterLetters('Mang',this)">From Mang</button>
    <button class="filter-btn" onclick="filterLetters('Cing',this)">From Cing</button>
  </div>
  <div id="lettersContainer"></div>
</div>
</main>
<script src="js/shared.js"></script>
<script>
checkAuth(); applyTheme();
document.getElementById('navPlaceholder').innerHTML = navHtml('letters');
spawnPetals(document.getElementById('petalsBg'), 18);
const role=getRole();
const senderName=role==='mang'?'Mang':role==='cing'?'Cing':'Guest';
const badge=document.getElementById('fromBadge');
badge.textContent=role==='mang'?'Writing as Mang Muan Mung':role==='cing'?'Writing as Cing Sian Hoih Lian':'View only';
badge.className='from-badge '+(role==='mang'?'from-mang':role==='cing'?'from-cing':'from-site');
let letters=JSON.parse(localStorage.getItem('love_letters')||'[]');
let currentFilter='all';
function sendLetter(){
  const sub=document.getElementById('subjectInput').value.trim();
  const body=document.getElementById('letterBody').value.trim();
  if(!sub||!body){ showNotif('Please fill in subject and message.'); return; }
  if(role==='site'){ showNotif('Log in as Mang or Cing to send letters.'); return; }
  letters.unshift({id:Date.now(),from:senderName,subject:sub,body,date:new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}),reactions:{}});
  saveLetter(); renderLetters(); clearForm(); showNotif('Letter sent.');
}
function clearForm(){ document.getElementById('subjectInput').value=''; document.getElementById('letterBody').value=''; }
function saveLetter(){ try{ localStorage.setItem('love_letters',JSON.stringify(letters)); }catch(e){} }
function deleteLetter(id){ if(confirm('Delete this letter?')){ letters=letters.filter(l=>l.id!==id); saveLetter(); renderLetters(); } }
function react(id,label){
  const l=letters.find(x=>x.id===id);
  if(l){ l.reactions[label]=(l.reactions[label]||0)+1; saveLetter(); renderLetters(); }
}
function filterLetters(f,btn){ currentFilter=f; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderLetters(); }
function renderLetters(){
  const con=document.getElementById('lettersContainer');
  let filtered=currentFilter==='all'?letters:letters.filter(l=>l.from===currentFilter);
  if(!filtered.length){ con.innerHTML='<div class="no-letters">No letters yet. Write the first one.</div>'; return; }
  const reactions=[['Love','Love'],['Beautiful','Beautiful'],['Miss you','Miss you']];
  con.innerHTML=filtered.map(l=>{
    const reactionBtns=reactions.map(([key,label])=>`<button class="react-btn" onclick="react(${l.id},'${key}')">${label}${l.reactions[key]?' ('+l.reactions[key]+')':''}</button>`).join('');
    const fromClass=l.from==='Mang'?'from-mang':'from-cing';
    const canDelete=role==='mang'&&l.from==='Mang'||role==='cing'&&l.from==='Cing';
    return `<div class="letter-card">
      <div class="letter-header">
        <div>
          <span class="from-badge ${fromClass}">${l.from==='Mang'?'Mang Muan Mung':'Cing Sian Hoih Lian'}</span>
          <div class="letter-from-name">${l.from==='Mang'?'Dear Cing,':'Dear Mang,'}</div>
        </div>
        <span class="letter-date">${l.date}</span>
      </div>
      <div class="letter-subject">&ldquo;${l.subject}&rdquo;</div>
      <div class="letter-body-text">${l.body.replace(/\n/g,'<br>')}</div>
      <div class="letter-footer">${reactionBtns}${canDelete?`<button class="del-letter" onclick="deleteLetter(${l.id})">Delete</button>`:''}</div>
    </div>`;
  }).join('');
}
if(!letters.length){
  letters=[{id:1,from:'Mang',subject:'The day I knew',body:'Dear Cing,\n\nThe day I realized I loved you wasn\'t a grand moment. It was a small, quiet Tuesday when you laughed at something silly and I thought &mdash; I want to hear that laugh for the rest of my life.\n\nYou are my favorite person in this whole world.\n\nAll my love,\nMang',date:'A day in forever',reactions:{}}];
  saveLetter();
}
renderLetters();
</script>
</body>
</html>
